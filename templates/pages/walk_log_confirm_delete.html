{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-4 text-center">
                    <h1 class="h4 font-weight-bold mb-4 text-danger">⚠️ 記録の削除確認</h1>

                    <p class="mb-4">
                        <strong>{{ object.date|date:"Y年m月d日" }}（{{ object.get_time_of_day_display }}）</strong>のお散歩ログを削除しますか？<br>
                        <span class="text-muted small">※この操作は取り消せません。</span>
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'walk_log_list' %}" class="btn btn-light px-4 mr-2">キャンセル</a>
                            <button type="submit" class="btn btn-danger px-4">本当に削除する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
