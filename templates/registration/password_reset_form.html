{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-white">
                <div class="card-body p-4">
                    <h1 class="h4 font-weight-bold mb-3 text-center">🔐 パスワードの再設定</h1>
                    <p class="text-muted small mb-4">登録しているメールアドレスを入力してください。パスワード再設定用のリンクをメールでお送りします。</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group mb-4">
                            <label for="id_email" class="font-weight-bold small">メールアドレス</label>
                            <input type="email" name="email" autocomplete="email" required id="id_email" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary btn-block shadow-sm">再設定メールを送信する</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="/login/" class="text-secondary small">ログイン画面に戻る</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
