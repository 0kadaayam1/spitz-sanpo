{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="font-weight-bold text-primary">スピッツさんぽ</h2>
                        <span class="badge badge-primary p-2 font-weight-bold">🏪 加盟店・お店専用ログイン</span>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} small" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group">
                            <label class="small font-weight-bold">お店のユーザー名（ID）</label>
                            <input type="text" name="username" class="form-control" placeholder="ユーザー名を入力" required>
                        </div>
                        <div class="form-group mb-4">
                            <label class="small font-weight-bold">パスワード</label>
                            <input type="password" name="password" class="form-control" placeholder="パスワードを入力" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block font-weight-bold py-2 shadow-sm" style="border-radius: 20px;">
                            お店としてログイン
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <a href="{% url 'login' %}" class="small text-muted">一般ユーザーの方のログインはこちら</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
