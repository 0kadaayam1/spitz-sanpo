{% extends 'base.html' %}

{% block main %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-white p-4">
                <h1 class="h4 font-weight-bold mb-3 text-success">📨 メールを送信しました</h1>
                <p class="text-dark small mb-4">
                    ご入力いただいたメールアドレス宛に、パスワード再設定用のリンクを記載したメールを送信しました。
                </p>
                
                <div class="alert alert-warning small text-left mb-4" style="background-color: #fff9e6; border-color: #ffeeba; color: #856404;">
                    <strong>💡 メールが届かない場合：</strong><br>
                    入力されたメールアドレスが正しく登録されているか、または迷惑メールフォルダ等に振り分けられていないかご確認ください。
                </div>
                
                <a href="/" class="btn btn-primary px-5 shadow-sm">トップページへ戻る</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
