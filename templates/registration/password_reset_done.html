{% extends 'base.html' %}

{% block main %}
<div class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 bg-white p-4">
                <h1 class="h4 font-weight-bold mb-3 text-success">📨 メールを送信しました</h1>
                <p class="text-dark small mb-4">
                    ご入力いただいたメールアドレス宛に、パスワード再設定用のリンクを記載したメールを送信しました。
                </p>
                <div class="alert alert-info small text-left mb-4">
                    <strong>💡 開発中の注意：</strong><br>
                    実際のメールは送信されません。コマンドプロンプトやターミナル（黒い画面）にメールの内容が出力されていますので、そこにある長いURLを探してクリックしてください！
                </div>
                <a href="/" class="btn btn-outline-secondary px-4">トップページへ戻る</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
