{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8">

            <div class="card shadow-sm p-4 bg-white">
                <h1 class="h3 font-weight-bold mb-4 text-center">🐾 今日のお散歩ログ</h1>
                <p class="text-center text-muted、 mb-4">愛犬との楽しいお散歩の思い出を記録しましょう！</p>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="row">
                        <div class="form-group col-md-6 mb-3">
                            <label class="font-weight-bold">お散歩日</label>
                            {{ form.date }}
                        </div>

                        <div class="form-group col-md-6 mb-3">
                            <label class="font-weight-bold">時間帯</label>
                            {{ form.time_of_day }}
                        </div>
                    </div>

                    <div class="form-group mb-3">
                        <label class="font-weight-bold">お散歩メモ・日記</label>
                        {{ form.note }}
                    </div>

                    <div class="form-group mb-4">
                        <label class="font-weight-bold">お散歩でのベストショット（任意）</label>
                        {{ form.walk_image }}
                        <small class="text-muted d-block mt-1">お散歩中に撮影した可愛い写真を添付できます。</small>
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5 shadow-sm">🐾 記録を保存する</button>
                        <div class="mt-3">
                            <a href="/" class="text-secondary">トップページに戻る</a>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
