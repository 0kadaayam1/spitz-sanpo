{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow-sm">
                <div class="card-header bg-danger text-white font-weight-bold text-center py-3">
                    ⚠ 運営管理者・強制削除確認
                </div>
                <div class="card-body p-4 text-center">
                    <p class="lead font-weight-bold text-dark mb-4">本当にこのデータをシステムから強制削除しますか？</p>
                    <div class="alert alert-warning small text-left" role="alert">
                        ※この操作は取り消せません。データベースから関連データを含めて永久に消去されます。
                    </div>
                    
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <a href="{% url 'admin_dashboard' %}" class="btn btn-secondary font-weight-bold px-4 mr-2" style="border-radius: 15px;">
                            キャンセル
                        </a>
                        <button type="submit" class="btn btn-danger font-weight-bold px-4" style="border-radius: 15px;">
                            完全に削除する
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
