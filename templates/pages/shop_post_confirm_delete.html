{% extends 'base.html' %}

{% block main %}
<div class="container my-5" style="max-width: 500px;">
    <div class="card shadow-sm border-0 bg-white">
        <div class="card-body p-4 text-center">
            <div class="text-danger mb-3" style="font-size: 3rem;">⚠️</div>
            <h1 class="h4 font-weight-bold mb-3 text-dark">お知らせの削除確認</h1>
            
            <p class="text-muted mb-4 small">
                投稿「<strong class="text-dark">{{ object.title }}</strong>」を削除しようとしています。<br>
                この操作は取り消せませんが、本当に削除してもよろしいですか？
            </p>

            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'shop_my_posts' %}" class="btn btn-light px-4">キャンセル</a>
                    <button type="submit" class="btn btn-danger px-4 shadow-sm">本当に削除する 🗑️</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
