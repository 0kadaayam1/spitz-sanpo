{% extends 'base.html' %}

{% block main %}
<div class="container my-5" style="max-width: 400px;">
    <h2 class="mb-4 text-center">ログイン</h2>
    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        {% if form.errors %}
        <div class="alert alert-danger">ユーザー名またはパスワードが違います。</div>
        {% endif %}

        <div class="form-group mb-3">
            <label class="form-label">ユーザー名</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group mb-3">
            <label class="form-label">パスワード</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">ログイン</button>

        <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}" class="text-muted small">パスワードを忘れた方はこちら 🔑</a>
        </div>
    </form>

    <hr class="my-4">
    <div class="text-center bg-light p-3 rounded" style="border: 1px dashed #ced4da;">
        <p class="small text-secondary mb-2 font-weight-bold">🏪 加盟店舗の皆さまへ</p>
        <a href="{% url 'shop_login' %}" class="btn btn-sm btn-outline-primary font-weight-bold px-4"
            style="border-radius: 20px; font-size: 13px;">
            お店アカウント専用ログインはこちら
        </a>
    </div>
    
    <div class="text-center mt-3">
        <a href="{% url 'signup' %}" class="small">はじめてご利用の方（新規登録）</a>
    </div>
</div>
{% endblock %}
